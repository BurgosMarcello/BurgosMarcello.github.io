<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Book a Call — Burgos Studio</title>
<meta name="description" content="Book a quick call with Marcello at Burgos Studio — 15 or 30 minutes. Pick a time that works." />
<link rel="canonical" href="https://burgosstudio.com/book/" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23b6b6c4'/%3E%3Cstop offset='55%25' stop-color='%23fbfbff'/%3E%3Cstop offset='100%25' stop-color='%238c8c9c'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='46' font-family='system-ui,sans-serif' font-size='42' font-weight='800' fill='%230a0a12' text-anchor='middle'%3EB%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#0a0a12;--bg2:#101019;--text:#f4f4f8;--muted:#9b9bb4;--faint:#8e8ea6;--v:#fbfbff;--grad:linear-gradient(135deg,#b6b6c4 0%,#fbfbff 52%,#8c8c9c 100%);--border:rgba(255,255,255,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Space Grotesk",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1000px;margin:0 auto;padding:0 24px}
  header{border-bottom:1px solid var(--border);padding:18px 0}
  .brand{display:inline-flex;align-items:center;gap:10px;font-weight:700;font-size:17px}
  main{padding:46px 0 72px}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  h1{font-size:clamp(32px,6vw,52px);font-weight:700;letter-spacing:-.03em;margin:12px 0 8px}
  .sub{color:var(--muted);font-size:17px;max-width:50ch;margin-bottom:30px}
  .cal-wrap{border:1px solid var(--border);border-radius:20px;overflow:hidden;min-height:640px;background:var(--bg2)}
  #cal-inline{width:100%;min-height:640px;overflow:auto}
  .fallback{text-align:center;color:var(--muted);font-size:14px;padding:24px}
  .fallback a{color:var(--v);text-decoration:underline;text-underline-offset:3px}
  .back{display:inline-block;margin-top:26px;font-size:14px;color:var(--v);text-decoration:underline;text-underline-offset:3px}
  footer{border-top:1px solid var(--border);padding:24px 0;color:var(--faint);font-size:13px}
</style>
</head>
<body>
<header><div class="wrap"><a href="/" class="brand"><svg viewBox="0 0 64 64" height="26" style="display:block" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bk" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#b6b6c4"/><stop offset="55%" stop-color="#fbfbff"/><stop offset="100%" stop-color="#8c8c9c"/></linearGradient></defs><rect width="64" height="64" rx="15" fill="url(#bk)"/><text x="32" y="46" font-family="Space Grotesk,sans-serif" font-size="40" font-weight="700" fill="#0a0a12" text-anchor="middle">B</text></svg> Burgos Studio</a></div></header>
<main>
  <div class="wrap">
    <span class="eyebrow">Let's talk</span>
    <h1>Book a call</h1>
    <p class="sub">Grab 15 or 30 minutes with me — pick any time that works and we'll talk through your project. No pressure, no pitch.</p>
    <div class="cal-wrap">
      <div id="cal-inline"><p class="fallback">Loading the calendar… if it doesn't appear, <a href="https://cal.com/burgosstudio" target="_blank" rel="noopener">book directly here →</a></p></div>
    </div>
    <a href="/" class="back">← Back to Burgos Studio</a>
  </div>
</main>
<footer><div class="wrap">© <span id="yr"></span> Burgos Studio</div></footer>
<script>document.getElementById('yr').textContent=new Date().getFullYear();</script>

</body>
</html>
